apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-webapp-deploy
  labels:
    app: my-gitops-app
spec:
  replicas: 2 # आपण २ कंटेनर्स चालवणार आहोत
  selector:
    matchLabels:
      app: my-gitops-app
  template:
    metadata:
      labels:
        app: my-gitops-app
    spec:
      containers:
      - name: web-container
        image: nginx:alpine # साधी आणि वेगवान वेब इमेज
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-webapp-service
spec:
  type: NodePort
  selector:
    app: my-gitops-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080 # आपण हा फिक्स पोर्ट वापरणार आहोत
